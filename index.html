<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="SCMM Pasos">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#e3001b">
    
    <title>Calculadora de Pasos - SCMM</title>
    <style>
        /* --- ESTILOS GENERALES Y PROTECCIÓN --- */
        body { 
            font-family: '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            color: #333; 
            padding: 20px; 
            margin: 0; 
            background-color: #e5e7eb; 
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent; 
            
            /* --- PROTECCIÓN ANTI-COPIA (Capa 1) --- */
            -webkit-user-select: none; /* Safari */
            -ms-user-select: none; /* IE 10 and IE 11 */
            user-select: none; /* Standard syntax */
        }

        #background-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; 
            pointer-events: none; 
        }

        .floating-logo {
            position: absolute;
            width: 220px; 
            height: 220px;
            
            /* ========================================================= */
            /* PEGA TU CÓDIGO BASE64 DENTRO DE LAS COMILLAS DE ABAJO     */
            /* ========================================================= */
            background-image: url('TU_CODIGO_BASE64_AQUI'); 
            
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.25; 
            mix-blend-mode: multiply; 
            
            animation-name: girarSobreSiMismo;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            transform-origin: center center;
        }

        @keyframes girarSobreSiMismo {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: rgba(255, 255, 255, 0.96); 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.15); 
            box-sizing: border-box; 
            position: relative; 
            max-height: 92vh;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
        }

        h1 { color: #e3001b; text-align: center; font-size: 28px; margin-top: 5px;} 
        
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .tab-btn { flex: 1; padding: 15px 10px; background: none; border: none; font-size: 16px; font-weight: bold; cursor: pointer; color: #666; transition: 0.3s; text-align: center; outline: none; }
        .tab-btn:hover { background-color: #f0f0f0; }
        .tab-btn.active { color: #0056b3; border-bottom: 3px solid #0056b3; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #444; }
        select { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; background-color: #f9f9f9; appearance: none; -webkit-appearance: none; }
        
        button.action-btn { width: 100%; padding: 16px; background-color: #0056b3; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: background 0.3s; font-weight: bold; box-shadow: 0 4px 6px rgba(0,86,179,0.2);}
        button.action-btn:hover { background-color: #004494; }
        button.action-btn:active { transform: scale(0.98); }
        
        #resultado, #resultado-cabeceras { margin-top: 20px; padding: 20px; background-color: #e9ecef; border-radius: 8px; display: none; text-align: center; }
        #resultado h2, #resultado-cabeceras h2 { margin-top: 0; font-size: 24px; color: #333; }
        
        /* --- ESTILOS DEL TERMÓMETRO VISUAL --- */
        #esquema-visual { margin-top: 20px; text-align: left; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ccc; }
        .tramo-visual { display: flex; flex-direction: column; position: relative; }
        .nodo-visual { display: flex; align-items: center; position: relative; z-index: 2; }
        .punto-estacion { width: 20px; height: 20px; border-radius: 50%; background: white; border: 5px solid; margin-right: 15px; box-sizing: border-box;}
        .punto-recinto { width: 20px; height: 20px; border-radius: 4px; background: white; border: 5px solid #5cb85c; margin-right: 15px; box-sizing: border-box;}
        .punto-transbordo { width: 20px; height: 20px; border-radius: 4px; background: white; border: 5px solid #d9534f; margin-right: 15px; box-sizing: border-box;}
        .texto-estacion { font-weight: bold; font-size: 16px; }
        
        .linea-conexion { display: flex; align-items: center; margin-left: 7.5px; padding: 15px 0; border-left: 5px solid; padding-left: 27.5px; position: relative;}
        .linea-transbordo { border-left: 5px dashed #d9534f; }
        .linea-acceso { border-left: 5px dashed #5cb85c; }
        
        .etiqueta-pasos { background: #0056b3; color: white; padding: 4px 10px; border-radius: 12px; font-size: 13px; font-weight: bold; display: inline-block;}
        .etiqueta-transbordo { background: #d9534f; }
        .etiqueta-acceso { background: #5cb85c; }
        
        .ruta-lista { list-style-type: none; padding: 15px; margin: 0; text-align: left;}
        .ruta-lista li { padding: 10px 0; border-bottom: 1px solid #eee; font-size: 15px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .ruta-lista li:last-child { border-bottom: none; }
        .transbordo { color: #d9534f; font-weight: bold; }
        .recinto { color: #5cb85c; font-weight: bold; }
        .pasos-badge { background: #0056b3; color: white; padding: 4px 10px; border-radius: 12px; font-size: 14px; font-weight: bold; white-space: nowrap; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 20px; max-height: 96vh; }
            h1 { font-size: 24px; }
            .tabs { flex-direction: row; border-bottom: none; gap: 5px; margin-bottom: 15px;}
            .tab-btn { border: 1px solid #ddd; border-radius: 8px; padding: 12px 5px; font-size: 14px; }
            .tab-btn.active { border-bottom: 1px solid #0056b3; background-color: #eaf2fb; }
            .ruta-lista li { font-size: 14px; flex-direction: column; align-items: flex-start; }
            .pasos-badge { align-self: flex-end; margin-top: 5px; }
            select { font-size: 16px; padding: 12px; } 
            .floating-logo { width: 150px; height: 150px; } 
        }
    </style>
</head>
<body>

<div id="background-container"></div>

<div class="container">
    <h1>Calculadora Pasos SCMM</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('ruta')" id="btn-ruta">Ruta Exacta</button>

    };

    const lineasCirculares = ["L6", "L12"];
    const cabecerasCircularesExcepcionales = ["Laguna|L6", "Ciudad Universitaria|L6", "Loranca|L12"];

    const excepcionesTransbordo = {
        "Diego de León|L4-Diego de León|L5": 3,
        "Diego de León|L4-Diego de León|L6": 3,
        "Diego de León|L5-Diego de León|L6": 2,
        "Núñez de Balboa|L5-Núñez de Balboa|L9A": 3,
        "Acacias|L5-Embajadores|L3": 3,
        "Noviciado|L2-Plaza de España|L3": 3,
        "Noviciado|L2-Plaza de España|L10A": 3,
        "Nuevos Ministerios|L6-Nuevos Ministerios|L8": 3,
        "Nuevos Ministerios|L6-Nuevos Ministerios|L10A": 3,
        "Plaza Elíptica|L6-Plaza Elíptica|L11": 2,
        "Tribunal|L1-Tribunal|L10A": 2,
        "Alonso Martínez|L4-Alonso Martínez|L10A": 2
    };

    let grafo = {};
    let nodos = [];

    function addEdge(n1, n2, peso, esTransbordo = false) {
        if (!grafo[n1]) { grafo[n1] = []; if (!nodos.includes(n1)) nodos.push(n1); }
        if (!grafo[n2]) { grafo[n2] = []; if (!nodos.includes(n2)) nodos.push(n2); }
        
        let pesoFinal = peso;
        if (esTransbordo) {
            let key1 = `${n1}-${n2}`;
            let key2 = `${n2}-${n1}`;
            if (excepcionesTransbordo[key1]) pesoFinal = excepcionesTransbordo[key1];
            if (excepcionesTransbordo[key2]) pesoFinal = excepcionesTransbordo[key2];
        }

        grafo[n1].push({ nodo: n2, peso: pesoFinal, esTransbordo: esTransbordo });
        grafo[n2].push({ nodo: n1, peso: pesoFinal, esTransbordo: esTransbordo });
    }

    for (let linea in lineas) {
        let estaciones = lineas[linea];
        for (let i = 0; i < estaciones.length; i++) {
            let nodoActual = `${estaciones[i]}|${linea}`;
            if (!nodos.includes(nodoActual)) nodos.push(nodoActual);
            if (i < estaciones.length - 1) {
                let nodoSiguiente = `${estaciones[i+1]}|${linea}`;
                addEdge(nodoActual, nodoSiguiente, 1);
            }
        }
        if (lineasCirculares.includes(linea)) {
            addEdge(`${estaciones[0]}|${linea}`, `${estaciones[estaciones.length - 1]}|${linea}`, 1);
        }
    }

    for (let i = 0; i < nodos.length; i++) {
        for (let j = i + 1; j < nodos.length; j++) {
            let est1 = nodos[i].split("|")[0];
            let est2 = nodos[j].split("|")[0];
            if (est1 === est2 && nodos[i] !== nodos[j]) {
                addEdge(nodos[i], nodos[j], 1, true);
            }
        }
    }

    addEdge("Acacias|L5", "Embajadores|L3", 1, true);

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${tabId}`).classList.add('active');
        document.getElementById(`btn-${tabId}`).classList.add('active');
    }

    function generarFondoDinamico() {
        const container = document.getElementById('background-container');
        container.innerHTML = ''; 
        
        const isMobile = window.innerWidth <= 600;
        const size = isMobile ? 150 : 220; 
        const safeDistance = size * 1.15; 
        
        const maxLogos = isMobile ? 5 : 12; 
        const placedLogos = [];

        for (let i = 0; i < maxLogos; i++) {
            let overlap = true;
            let attempts = 0;
            let posX, posY;

            while (overlap && attempts < 150) {
                overlap = false;
                posX = Math.random() * (window.innerWidth - size);
                posY = Math.random() * (window.innerHeight - size);

                for (const placed of placedLogos) {
                    const dx = posX - placed.x;
                    const dy = posY - placed.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < safeDistance) { overlap = true; break; }
                }
                attempts++;
            }

            if (!overlap) {
                placedLogos.push({x: posX, y: posY});
                let logo = document.createElement('div');
                logo.classList.add('floating-logo');
                logo.style.left = posX + 'px';
                logo.style.top = posY + 'px';
                
                let duracion = Math.random() * 40 + 25; 
                let direccion = Math.random() > 0.5 ? 'normal' : 'reverse';
                logo.style.animationDuration = duracion + 's';
                logo.style.animationDirection = direccion;
                logo.style.animationDelay = '-' + (Math.random() * 50) + 's';

                container.appendChild(logo);
            }
        }
    }

    window.onload = function() {
        generarFondoDinamico();
        
        window.addEventListener('resize', () => {
            clearTimeout(window.resizeTimer);
            window.resizeTimer = setTimeout(generarFondoDinamico, 300);
        });

        let selectores = ["origen", "destino", "origen-cabeceras"].map(id => document.getElementById(id));
        
        let nodosOrdenados = [...nodos].sort((a, b) => {
            let isRecintoA = a.includes("Recinto");
            let isRecintoB = b.includes("Recinto");
            if (isRecintoA && !isRecintoB) return 1;
            if (!isRecintoA && isRecintoB) return -1;
            return a.localeCompare(b);
        });

        nodosOrdenados.forEach(nodo => {
            let partes = nodo.split("|");
            let nombreMostrar = partes[1] === "Recinto" ? `🏢 ${partes[0]}` : `${partes[0]} (${partes[1]})`;
            selectores.forEach(sel => sel.add(new Option(nombreMostrar, nodo)));
        });
    };

    function ejecutarDijkstra(origen, destinoParaValidacion = null) {
        let distancias = {};
        let previos = {};
        let noVisitados = new Set(nodos);

        nodos.forEach(n => { distancias[n] = Infinity; previos[n] = null; });
        distancias[origen] = 0;

        while (noVisitados.size > 0) {
            let nodoMinimo = null;
            for (let n of noVisitados) {
                if (nodoMinimo === null || distancias[n] < distancias[nodoMinimo]) nodoMinimo = n;
            }

            if (distancias[nodoMinimo] === Infinity) break;
            noVisitados.delete(nodoMinimo);

            for (let vecino of grafo[nodoMinimo]) {
                if (noVisitados.has(vecino.nodo)) {
                    if (vecino.nodo.includes("Recinto") && vecino.nodo !== origen && vecino.nodo !== destinoParaValidacion) {
                        continue; 
                    }

                    let peso = vecino.peso;
                    if (nodoMinimo === origen && vecino.esTransbordo) peso = 0;

                    let nuevaDistancia = distancias[nodoMinimo] + peso;
                    if (nuevaDistancia < distancias[vecino.nodo]) {
                        distancias[vecino.nodo] = nuevaDistancia;
                        previos[vecino.nodo] = { nodo: nodoMinimo, esTransbordo: vecino.esTransbordo, coste: peso };
                    }
                }
            }
        }
        return { distancias, previos };
    }

    function calcularRuta() {
        let origen = document.getElementById("origen").value;
        let destino = document.getElementById("destino").value;
        let div = document.getElementById("resultado");
        div.style.display = "block";

        if (origen === destino) { div.innerHTML = "<h2>Estás en la misma ubicación.</h2>"; return; }

        let { distancias, previos } = ejecutarDijkstra(origen, destino);
        
        if (distancias[destino] === Infinity) { div.innerHTML = "<h3>No se encontró una ruta.</h3>"; return; }

        let rutaRaw = [];
        let pasoActual = destino;
        while (pasoActual !== origen) {
            let prev = previos[pasoActual];
            rutaRaw.unshift({ origen: prev.nodo, destino: pasoActual, esTransbordo: prev.esTransbordo, coste: prev.coste });
            pasoActual = prev.nodo;
        }

        let rutaAgrupada = [];
        let tramoActual = null;

        rutaRaw.forEach(paso => {
            let isRecinto = paso.origen.includes("Recinto") || paso.destino.includes("Recinto");
            if (paso.esTransbordo || isRecinto) {
                if (tramoActual) { rutaAgrupada.push(tramoActual); tramoActual = null; }
                rutaAgrupada.push({ ...paso, isRecinto: isRecinto });
            } else {
                if (!tramoActual) {
                    tramoActual = { origen: paso.origen, destino: paso.destino, esTransbordo: false, coste: paso.coste, isRecinto: false };
                } else {
                    tramoActual.destino = paso.destino;
                    tramoActual.coste += paso.coste;
                }
            }
        });
        if (tramoActual) rutaAgrupada.push(tramoActual);

        let html = `<h2>Total de pasos: ${distancias[destino]}</h2>`;
        html += `<div id="esquema-visual">`;

        let ultimaLinea = "";

        rutaAgrupada.forEach((paso, index) => {
            let estOrigenParts = paso.origen.split("|");
            let estDestinoParts = paso.destino.split("|");
            
            let nomOrigen = estOrigenParts[0];
            let lineaOrigen = estOrigenParts[1];
            let nomDestino = estDestinoParts[0];
            let lineaDestino = estDestinoParts[1];

            let colorLinea = coloresLineas[lineaOrigen] || "#333";
            let colorDestino = coloresLineas[lineaDestino] || "#333";

            if (index === 0) {
                let clasePunto = lineaOrigen === "Recinto" ? "punto-recinto" : "punto-estacion";
                html += `<div class="nodo-visual"><div class="${clasePunto}" style="border-color: ${colorLinea}"></div><div class="texto-estacion">${nomOrigen} ${lineaOrigen !== "Recinto" ? `<span style="color:white; background:${colorLinea}; padding: 2px 6px; border-radius:4px; font-size:12px;">${lineaOrigen}</span>` : '🏢'}</div></div>`;
            }

            if (paso.esTransbordo) {
                html += `<div class="linea-conexion linea-transbordo">
                            <span class="etiqueta-pasos etiqueta-transbordo">Transbordo (+${paso.coste})</span>
                         </div>`;
            } else if (paso.isRecinto) {
                html += `<div class="linea-conexion linea-acceso">
                            <span class="etiqueta-pasos etiqueta-acceso">Acceso (+${paso.coste})</span>
                         </div>`;
            } else {
                html += `<div class="linea-conexion" style="border-left-color: ${colorLinea}">
                            <span class="etiqueta-pasos" style="background-color: ${colorLinea}">Tramo continuo (+${paso.coste} pasos)</span>
                         </div>`;
            }

            let clasePuntoDestino = lineaDestino === "Recinto" ? "punto-recinto" : "punto-estacion";
            if (paso.esTransbordo) clasePuntoDestino = "punto-transbordo"; 
            
            html += `<div class="nodo-visual"><div class="${clasePuntoDestino}" style="border-color: ${colorDestino}"></div><div class="texto-estacion">${nomDestino} ${lineaDestino !== "Recinto" ? `<span style="color:white; background:${colorDestino}; padding: 2px 6px; border-radius:4px; font-size:12px;">${lineaDestino}</span>` : '🏢'}</div></div>`;
            
            ultimaLinea = lineaDestino;
        });

        html += `</div>`;
        div.innerHTML = html;
    }

    function calcularCabeceras() {
        let origen = document.getElementById("origen-cabeceras").value;
        let { distancias } = ejecutarDijkstra(origen);
        
        let cabeceras = [];
        
        for (let l in lineas) {
            if (lineasCirculares.includes(l)) {
                cabecerasCircularesExcepcionales.forEach(cabeceraCircular => {
                    if (cabeceraCircular.endsWith(`|${l}`) && !cabeceras.find(c => c.nodo === cabeceraCircular)) {
                        cabeceras.push({ nodo: cabeceraCircular, dist: distancias[cabeceraCircular] });
                    }
                });
                continue; 
            }
            let ests = lineas[l];
            let cabecera1 = `${ests[0]}|${l}`;
            let cabecera2 = `${ests[ests.length - 1]}|${l}`;
            
            if (!cabeceras.find(c => c.nodo === cabecera1)) cabeceras.push({ nodo: cabecera1, dist: distancias[cabecera1] });
            if (cabecera1 !== cabecera2 && !cabeceras.find(c => c.nodo === cabecera2)) {
                cabeceras.push({ nodo: cabecera2, dist: distancias[cabecera2] });
            }
        }
        cabeceras = cabeceras.filter(c => c.dist !== Infinity).sort((a, b) => a.dist - b.dist);

        let div = document.getElementById("resultado-cabeceras");
        div.style.display = "block";
        
        let html = `<h2>Distancia a Cabeceras</h2>`;
        html += `<ul class="ruta-lista" style="border: 1px solid #ccc; border-radius: 8px; background: white;">`;
        cabeceras.forEach(c => {
            let nombreFormateado = c.nodo.replace("|", " (") + ")";
            html += `<li><span>📍 ${nombreFormateado}</span> <span class="pasos-badge">${c.dist} pasos</span></li>`;
        });
        html += `</ul>`;
        div.innerHTML = html;
    }
</script>
